name: ilmai
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.7+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  google_generative_ai: ^0.4.0
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.1.1
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  intl: ^0.20.2
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  pdf: ^3.11.1
  printing: ^5.13.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.4
  flutter_downloader: ^1.11.8
  image_cropper: ^8.0.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  share_plus: ^13.2.0
  camera: ^0.11.0+2
  flutter_math_fork: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# This is where your assets and design settings go!
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
